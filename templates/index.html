<!DOCTYPE html>
<html>
<head>
    <title>Music Mashup Generator</title>
</head>
<body>
    <h2>Music Mashup Generator</h2>

    <form method="POST">
        <label>Singer Name:</label><br>
        <input type="text" name="singer" required><br><br>

        <label>Number of Videos ( >10 ):</label><br>
        <input type="number" name="videos" required><br><br>

        <label>Duration per Clip (seconds >20):</label><br>
        <input type="number" name="duration" required><br><br>

        <label>Email ID:</label><br>
        <input type="email" name="email" required><br><br>

        <button type="submit">Create Mashup</button>
    </form>
</body>
</html>
